[build]
  command = "npm run build"
  publish = ".next"

[build.environment]
  NODE_VERSION = "20"
  NPM_FLAGS = "--include=optional"
  LIGHTNING_CSS_FORCE_WASM = "true"

# Next.js on Netlify - handles all routes properly
[[redirects]]
  from = "/*"
  to = "/.netlify/functions/nextjs/:splat"
  status = 200
